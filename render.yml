services:
  - type: web
    name: shanti-ai
    runtime: docker
    plan: starter
    repo: https://github.com/YOUR_USERNAME/shantiAI
    region: oregon
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SESSION_SECRET
        sync: false
